server:
  port: 9091

spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/smart_retail_users
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange: smart-retail.topic.exchange

jwt:
  secret: smartretail-secret-key-for-jwt-token-generation-minimum-32-chars
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  show-actuator: true
  servers:
    - url: http://localhost:9091
      description: User Service - Direct