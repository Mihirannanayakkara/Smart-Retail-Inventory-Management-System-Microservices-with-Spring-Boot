server:
  port: 9095

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/smart_retail_notifications
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange: smart-retail.topic.exchange
  queues:
    user-registered: notification.user.registered
    order-created: notification.order.created
    order-cancelled: notification.order.cancelled
    low-stock: notification.low.stock
    restock-created: notification.restock.created
    restock-completed: notification.restock.completed

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  show-actuator: true
