server:
  port: 9094

spring:
  application:
    name: supplier-restock-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/smart_retail_supplier
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange: smart-retail.topic.exchange

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  show-actuator: true